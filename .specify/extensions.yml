hooks:
  after_specify:
    - extension: git
      enabled: true
      optional: true
      command: speckit.git.commit
      description: "Auto-commit specification changes"
  after_clarify:
    - extension: git
      enabled: true
      optional: true
      command: speckit.git.commit
      description: "Auto-commit clarification changes"
  after_plan:
    - extension: git
      enabled: true
      optional: true
      command: speckit.git.commit
      description: "Auto-commit plan changes"
  after_tasks:
    - extension: git
      enabled: true
      optional: true
      command: speckit.git.commit
      description: "Auto-commit task list changes"
  after_analyze:
    - extension: git
      enabled: true
      optional: true
      command: speckit.git.commit
      description: "Auto-commit analysis changes"
  after_implement:
    - extension: git
      enabled: true
      optional: true
      command: speckit.git.commit
      description: "Auto-commit implementation changes"
