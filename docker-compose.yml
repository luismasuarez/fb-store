services:
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 3

  api:
    build:
      context: .
      dockerfile: docker/Dockerfile.api
    ports:
      - "3000:3000"
    env_file:
      - .env
    environment:
      - NODE_ENV=production
      - DATABASE_URL=postgresql://fbstore:fbstore@postgres:5432/fbstore
      - REDIS_URL=redis://redis:6379
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped

  scraper:
    build:
      context: .
      dockerfile: docker/Dockerfile.scraper
    env_file:
      - .env
    environment:
      - NODE_ENV=production
      - DATABASE_URL=postgresql://fbstore:fbstore@postgres:5432/fbstore
      - REDIS_URL=redis://redis:6379
    volumes:
      - ./profiles:/app/profiles
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped

  ai-processor:
    build:
      context: .
      dockerfile: docker/Dockerfile.ai-processor
    env_file:
      - .env
    environment:
      - NODE_ENV=production
      - DATABASE_URL=postgresql://fbstore:fbstore@postgres:5432/fbstore
      - REDIS_URL=redis://redis:6379
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped
