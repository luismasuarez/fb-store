services:
  full:
    build:
      context: .
      dockerfile: docker/Dockerfile.full
    ports:
      - "3000:3000"
    env_file:
      - .env
    environment:
      - NODE_ENV=production
      - DATABASE_URL=postgresql://fbstore:fbstore@postgres:5432/fbstore
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - fb-store-net

  postgres:
    image: postgres:18-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: fbstore
      POSTGRES_PASSWORD: fbstore
      POSTGRES_DB: fbstore
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U fbstore -d fbstore"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - fb-store-net

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 3
    networks:
      - fb-store-net

  api:
    build:
      context: .
      dockerfile: docker/Dockerfile.api
    ports:
      - "3000:3000"
    env_file:
      - .env
    environment:
      - NODE_ENV=production
      - DATABASE_URL=postgresql://fbstore:fbstore@postgres:5432/fbstore
      - REDIS_URL=redis://redis:6379
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - fb-store-net

  scraper:
    build:
      context: .
      dockerfile: docker/Dockerfile.scraper
    env_file:
      - .env
    environment:
      - NODE_ENV=production
      - DATABASE_URL=postgresql://fbstore:fbstore@postgres:5432/fbstore
      - REDIS_URL=redis://redis:6379
    volumes:
      - ./profiles:/app/profiles
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - fb-store-net

  ai-processor:
    build:
      context: .
      dockerfile: docker/Dockerfile.ai-processor
    env_file:
      - .env
    environment:
      - NODE_ENV=production
      - DATABASE_URL=postgresql://fbstore:fbstore@postgres:5432/fbstore
      - REDIS_URL=redis://redis:6379
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - fb-store-net

volumes:
  postgres-data:
    name: fb-store-postgres-data
    driver: local
  redis-data:
    name: fb-store-redis-data
    driver: local

networks:
  fb-store-net:
    name: fb-store-net
    driver: bridge
